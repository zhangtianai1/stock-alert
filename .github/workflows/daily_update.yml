name: 每日行情更新
on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python fetch_data.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "每日行情更新"
          file_pattern: '_market_data.json'
