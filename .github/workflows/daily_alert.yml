name: daily alert
on:
  schedule:
    - cron: '0 1 * * 1-5'
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
jobs:
  morning:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python morning_report.py
        env:
          WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - run: python alert.py
        env:
          WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
